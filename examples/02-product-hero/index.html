<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planespace — Product Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0f;
      --paper: #f0ede6;
      --accent: #e8642c;
      --accent2: #1a1a2e;
      --mid: #c8c3b8;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--ink);
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.2s, height 0.2s;
      opacity: 0.6;
    }

    /* ── Scene root ── */
    .scene {
      width: 100vw; height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ── Background: deep texture ── */
    .bg-texture {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 50%, #16101a 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 75% 60%, #0f1825 0%, transparent 55%),
        var(--ink);
    }
    .bg-grid {
      position: absolute; inset: -10%;
      background-image:
        linear-gradient(rgba(232,100,44,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,100,44,0.04) 1px, transparent 1px);
      background-size: 72px 72px;
      transform: perspective(600px) rotateX(12deg);
    }

    /* ── Depth layers ── */
    .orb-deep {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,100,44,0.12) 0%, transparent 70%);
      left: -160px; top: -180px;
      filter: blur(2px);
    }
    .orb-mid {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,120,240,0.10) 0%, transparent 70%);
      right: -80px; bottom: -100px;
      filter: blur(1px);
    }

    /* ── Hero block ── */
    .hero-eyebrow {
      position: absolute;
      top: 14%; left: 50%;
      transform: translateX(-50%);
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp 0.8s 0.3s forwards;
    }

    .hero-title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(-60px);
      text-align: center;
      white-space: nowrap;
    }
    .hero-title h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(4rem, 8vw, 7.5rem);
      line-height: 0.92;
      color: var(--paper);
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s forwards;
    }
    .hero-title h1 em {
      font-style: normal;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--accent);
    }

    .hero-sub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + clamp(3.2rem, 5vw, 5rem)));
      text-align: center;
      max-width: 440px;
    }
    .hero-sub p {
      font-weight: 300;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--mid);
      opacity: 0;
      animation: fadeUp 0.9s 0.75s forwards;
    }

    /* ── CTA ── */
    .hero-cta {
      position: absolute;
      bottom: 16%; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 16px; align-items: center;
      opacity: 0;
      animation: fadeUp 0.9s 1s forwards;
    }
    .btn-primary {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      background: var(--accent);
      border: none;
      padding: 14px 28px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,100,44,0.35);
    }
    .btn-ghost {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      color: var(--mid);
      border: 1px solid rgba(200,195,184,0.25);
      padding: 13px 24px;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { color: var(--paper); border-color: rgba(200,195,184,0.6); }

    /* ── Floating stat cards ── */
    .stat-card {
      position: absolute;
      background: rgba(240,237,230,0.04);
      border: 1px solid rgba(240,237,230,0.08);
      border-radius: 12px;
      padding: 18px 22px;
      backdrop-filter: blur(12px);
    }
    .stat-card .val {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      color: var(--paper);
      line-height: 1;
    }
    .stat-card .label {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--mid);
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
    .stat-1 { left: 8%; top: 32%; }
    .stat-2 { right: 9%; top: 38%; }
    .stat-3 { right: 12%; bottom: 26%; }

    /* ── Decorative floating line ── */
    .line-decoration {
      position: absolute;
      bottom: 8%; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(200,195,184,0.4);
    }
    .line-decoration::before, .line-decoration::after {
      content: '';
      width: 60px; height: 1px;
      background: rgba(200,195,184,0.2);
    }

    /* ── Corner tag ── */
    .corner-tag {
      position: absolute;
      top: 28px; right: 32px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(200,195,184,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="scene" id="scene">

    <!-- depth: -500 — deep background -->
    <div class="bg-texture" data-z="-500"></div>
    <div class="bg-grid" data-z="-480"></div>

    <!-- depth: -280 — atmospheric orbs -->
    <div class="orb-deep" data-z="-280"></div>
    <div class="orb-mid" data-z="-220"></div>

    <!-- depth: -120 — eyebrow label -->
    <div class="hero-eyebrow" data-z="-120">Spatial display layer</div>

    <!-- depth: 60 — main title foreground -->
    <div class="hero-title" data-z="60">
      <h1>The web<br>in <em>depth</em></h1>
    </div>

    <!-- depth: 20 — subtitle -->
    <div class="hero-sub" data-z="20">
      <p>Planespace adds perceptual parallax to standard HTML with a single attribute.
        No scene graph. No layout mutation. Just depth.</p>
    </div>

    <!-- depth: -180 — stat cards mid layer -->
    <div class="stat-card stat-1" data-z="-180">
      <div class="val">~0.2ms</div>
      <div class="label">per frame cost</div>
    </div>
    <div class="stat-card stat-2" data-z="-160">
      <div class="val">60fps</div>
      <div class="label">sustained render</div>
    </div>
    <div class="stat-card stat-3" data-z="-200">
      <div class="val">0</div>
      <div class="label">DOM mutations</div>
    </div>

    <!-- depth: 80 — CTA foreground -->
    <div class="hero-cta" data-z="80">
      <a class="btn-primary" href="#">Get started</a>
      <a class="btn-ghost" href="#">Read the spec →</a>
    </div>

    <!-- depth: -50 — decorative line -->
    <div class="line-decoration" data-z="-50">dom-native</div>

    <div class="corner-tag">planespace v1.0</div>
  </div>

  <script type="module">
    import { Planespace } from '../../src/index.js';

    // ── Custom cursor tracking ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      ring.style.left   = e.clientX + 'px';
      ring.style.top    = e.clientY + 'px';
    });

    // ── Planespace ──
    const ps = new Planespace({
      inputMode: 'mouse',
      maxAngle: 7,
      lerpFactor: 0.055,
      warpMode: 'transform',
      depthRange: [-500, 100],
      perspective: 1100,
    });

    await ps.mount(document.getElementById('scene'));

    ps.on('ready', () => {
      console.log('[example] planespace active — warp mode:', ps.warpMode);
    });
  </script>
</body>
</html>
